name: Quality Gate

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: HTML lint
        run: npm run lint:html

      - name: CSS lint
        run: npm run lint:css

      - name: Formatting check
        run: npm run format:check
