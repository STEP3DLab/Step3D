name: "🐞 Bug report"
description: Сообщить об ошибке на сайте.
title: "fix: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Спасибо! Пожалуйста, заполните шаблон максимально подробно.

  - type: textarea
    id: summary
    attributes:
      label: Что сломалось?
      description: Кратко опишите проблему.
      placeholder: Кнопка "Оставить заявку" не работает на мобильных.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Шаги для воспроизведения
      placeholder: |
        1. Открыть страницу ...
        2. Нажать ...
        3. Увидеть ошибку ...
    validations:
      required: true

  - type: input
    id: expected
    attributes:
      label: Ожидаемое поведение
      placeholder: Форма должна открываться.
    validations:
      required: true

  - type: input
    id: actual
    attributes:
      label: Фактическое поведение
      placeholder: Ничего не происходит.
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Чеклист проверки
      options:
        - label: Я проверил(а), что проблема воспроизводится на последней версии main.
          required: true
        - label: Я приложил(а) скриншоты/видео или логи, если это возможно.
          required: false
