<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Step3D — Перенаправление</title>
  <meta name="robots" content="noindex" />
  <script>
    (function redirectToHome() {
      var loc = window.location;
      var segments = loc.pathname.split('/').filter(Boolean);
      var projectBase = segments.length ? '/' + segments[0] + '/' : '/';
      var target = projectBase + loc.search + loc.hash;
      if (loc.pathname !== projectBase || loc.search || loc.hash) {
        window.location.replace(target);
      }
    }());
  </script>
</head>
<body>
  <p>Перенаправляем на главную… Если не сработало автоматически, <a href="./">нажмите сюда</a>.</p>
</body>
</html>
